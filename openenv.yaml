version: "1.0"
environment:
  name: "email-triage-env"
  description: "A multi-step email triage environment for the Meta OpenEnv Hackathon."
  observation_model: "models:EmailObservation"
  action_model: "models:EmailAction"
  entry_point: "env:EmailEnv"

tasks:
  - id: "task-easy"
    description: "Classify and handle a personal email."
    difficulty: "easy"
    grader: "grader:grade_easy"
  - id: "task-medium"
    description: "Classify and handle a work email."
    difficulty: "medium"
    grader: "grader:grade_medium"
  - id: "task-hard"
    description: "Classify and handle a critical/spam email."
    difficulty: "hard"
    grader: "grader:grade_hard"